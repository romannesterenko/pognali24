version: '3.8'

services:

  nginx:
    image: nginx:latest
    container_name: pognali24_nginx_prod

    ports:
      - "127.0.0.1:8080:80"

    volumes:
      - ./nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/var/www/frontend:ro
      - ./backend/storage:/var/www/backend/storage
      - ./backend/public:/var/www/backend/public

    depends_on:
      - backend
      - reverb

    restart: unless-stopped


  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod

    container_name: pognali24_backend_prod

    working_dir: /var/www/backend

    env_file:
      - .env.prod

    volumes:
      - ./backend/storage:/var/www/backend/storage
      - ./backend/public:/var/www/backend/public

    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

    restart: unless-stopped


  mysql:
    image: mysql:8
    container_name: pognali24_mysql_prod

    env_file:
      - .env.prod

    volumes:
      - mysql_data_prod:/var/lib/mysql

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5


  redis:
    image: redis:latest
    container_name: pognali24_redis_prod

    restart: unless-stopped


  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod

    container_name: pognali24_reverb_prod

    working_dir: /var/www/backend

    command: php artisan reverb:start --host=0.0.0.0 --port=8080

    env_file:
      - .env.prod

    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

    restart: unless-stopped

volumes:
  mysql_data_prod: