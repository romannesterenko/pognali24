version: '3.8'

services:
  nginx:
    image: nginx:latest
    container_name: pognali24_nginx_prod
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      # монтируем только конфиг (только для чтения), код не монтируем
      - ./nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
      # если нужны пользовательские файлы (storage) – можно volume, но не бинд-маунт папки backend
      - backend_storage:/var/www/backend/storage
      - frontend_dist:/var/www/frontend
    depends_on:
      - backend
    restart: always

  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod   # новый продовый Dockerfile
    container_name: pognali24_backend_prod
    working_dir: /var/www/backend
    # убрали volumes с кодом – код внутри образа
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    env_file:
      - .env.prod
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod

    container_name: pognali24_frontend_prod

    volumes:
      - frontend_dist:/dist

    command: sh -c "cp -r /app/dist/* /dist && tail -f /dev/null"

    restart: unless-stopped

  mysql:
    image: mysql:8
    container_name: pognali24_mysql_prod
    restart: always
    env_file:
      - .env.prod
    volumes:
      - mysql_data_prod:/var/lib/mysql
    ports: []   # не торчим наружу
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    container_name: pognali24_redis_prod
    restart: always
    ports: []   # не публикуем

  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod   # тот же образ, что и backend
    container_name: pognali24_reverb_prod
    working_dir: /var/www/backend
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    env_file:
      - .env.prod
    expose:
      - "8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

volumes:
  mysql_data_prod:
  backend_storage:
  frontend_dist: