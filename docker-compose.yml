services:

  nginx:
    image: nginx:latest
    container_name: pognali24_nginx
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www/backend
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend

  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: pognali24_backend
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
    depends_on:
      - mysql
      - redis

  frontend:
    image: node:22
    container_name: pognali24_frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: sh -c "tail -f /dev/null"

  mysql:
    image: mysql:8
    container_name: pognali24_mysql
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pognali24
      MYSQL_USER: pognali
      MYSQL_PASSWORD: secret

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:latest
    container_name: pognali24_redis
    ports:
      - "6379:6379"

  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    container_name: pognali24_reverb
    working_dir: /var/www/backend

    command: php artisan reverb:start --host=0.0.0.0 --port=8080

    volumes:
      - ./backend:/var/www/backend

    ports:
      - "8080:8080"

    depends_on:
      mysql:
        condition: service_healthy

      redis:
        condition: service_started

      backend:
        condition: service_started


volumes:
  mysql_data: